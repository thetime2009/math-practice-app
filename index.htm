<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฝึกบวกเลข - ตัวทดตรงหลัก</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f7ff;
            --primary: #4a90e2;
            --success: #4caf50;
            --carry-bg: #fff9c4;
            --carry-border: #fbc02d;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .app-card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 550px;
        }

        .difficulty-zones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn-mode {
            padding: 12px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-mode:hover {
            background: var(--primary);
            color: white;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #e3f2fd;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1565c0;
        }

        /* ตารางคณิตศาสตร์ */
        .math-container {
            display: inline-block;
            background: #fff;
            padding: 10px;
        }

        .row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 5px;
        }

        .label {
            font-size: 16px;
            font-weight: bold;
            color: #999;
            width: 70px;
            text-align: left;
        }

        input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            margin: 3px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
        }

        /* ช่องตัวทด: ขยับให้ตรงหลัก 10 ขึ้นไป */
        .carry-row input {
            height: 40px;
            width: 40px;
            font-size: 20px;
            background: var(--carry-bg);
            border: 2px dashed var(--carry-border);
            color: #e65100;
        }

        .spacer {
            width: 56px; /* ขนาดเท่ากับ input หลักหน่วย + margin */
        }

        .answer-row {
            border-top: 4px solid #444;
            margin-top: 10px;
            padding-top: 10px;
        }

        .answer-row input {
            border-color: var(--success);
            background: #f1f8e9;
        }

        .btn-check {
            width: 100%;
            padding: 18px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 0 #388e3c;
        }

        .btn-check:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .result-box {
            height: 50px;
            margin-top: 20px;
            font-size: 26px;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h2>✍️ ฝึกบวกเลข (มีตัวทด)</h2>
    
    <div class="difficulty-zones">
        <button class="btn-mode" onclick="startGame(1)">1 หลัก</button>
        <button class="btn-mode" onclick="startGame(2)">2 หลัก</button>
        <button class="btn-mode" onclick="startGame(3)">3 หลัก</button>
        <button class="btn-mode" onclick="startGame(4)">4 หลัก</button>
    </div>

    <div class="stats">
        <span>⏱️ <span id="time">0</span> วินาที</span>
        <span>🏆 <span id="score">0</span> คะแนน</span>
    </div>

    <div class="math-container">
        <!-- แถวตัวทด: เว้นว่างหลักหน่วย เพื่อให้ตรงกับหลักสิบขึ้นไป -->
        <div class="row carry-row">
            <span class="label">ตัวทด</span>
            <input type="number" id="c4" placeholder="10k">
            <input type="number" id="c3" placeholder="1k">
            <input type="number" id="c2" placeholder="100">
            <input type="number" id="c1" placeholder="10">
            <div class="spacer"></div> <!-- ช่องว่างเหนือหลักหน่วย -->
        </div>

        <!-- แถวโจทย์ -->
        <div class="row">
            <span class="label">ตัวตั้ง</span>
            <input type="text" id="q1_4" readonly>
            <input type="text" id="q1_3" readonly>
            <input type="text" id="q1_2" readonly>
            <input type="text" id="q1_1" readonly>
            <input type="text" id="q1_0" readonly>
        </div>
        <div class="row">
            <span class="label">ตัวบวก</span>
            <input type="text" id="q2_4" readonly>
            <input type="text" id="q2_3" readonly>
            <input type="text" id="q2_2" readonly>
            <input type="text" id="q2_1" readonly>
            <input type="text" id="q2_0" readonly>
        </div>

        <!-- แถวคำตอบ -->
        <div class="row answer-row">
            <span class="label">คำตอบ</span>
            <input type="number" id="a5">
            <input type="number" id="a4">
            <input type="number" id="a3">
            <input type="number" id="a2">
            <input type="number" id="a1">
            <input type="number" id="a0">
        </div>
    </div>

    <div id="result" class="result-box"></div>
    <button class="btn-check" onclick="checkAnswer()">🎯 ตรวจคำตอบ</button>
</div>

<!-- เสียงประกอบ -->
<audio id="sound-correct" src="https://soundjay.com"></audio>

<script>
    let currentAns = 0;
    let score = 0;
    let timer = 0;
    let timerInt;

    // จำกัดการกรอก 1 ตัว และ auto-focus
    document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('input', function() {
            if (this.value.length > 1) this.value = this.value.slice(-1);
            if (this.value !== "") {
                // หาช่อง input ถัดไปในแถวเดียวกัน หรือข้ามไปแถวคำตอบ
                let inputs = Array.from(document.querySelectorAll('input[type="number"]'));
                let index = inputs.indexOf(this);
                if (index < inputs.length - 1) inputs[index + 1].focus();
            }
        });
    });

    function startGame(digit) {
        clearInterval(timerInt);
        timer = 0;
        document.getElementById('time').innerText = timer;
        document.getElementById('result').innerText = "";
        
        // ล้างค่าทุกช่อง
        document.querySelectorAll('input').forEach(el => {
            if(!el.readOnly) el.value = "";
        });

        // สุ่มเลข
        let min = Math.pow(10, digit - 1);
        let max = Math.pow(10, digit) - 1;
        let n1 = Math.floor(Math.random() * (max - min + 1) + min);
        let n2 = Math.floor(Math.random() * (max - min + 1) + min);
        currentAns = n1 + n2;

        distribute('q1_', n1);
        distribute('q2_', n2);

        timerInt = setInterval(() => {
            timer++;
            document.getElementById('time').innerText = timer;
        }, 1000);
    }

    function distribute(prefix, num) {
        for(let i=0; i<=4; i++) document.getElementById(prefix + i).value = "";
        let arr = num.toString().split('').reverse();
        arr.forEach((d, i) => document.getElementById(prefix + i).value = d);
    }

    function checkAnswer() {
        let userStr = "";
        for(let i=5; i>=0; i--) {
            let val = document.getElementById('a' + i).value;
            if(val !== "") userStr += val;
        }
        
        if (parseInt(userStr) === currentAns) {
            document.getElementById('result').innerHTML = "<span style='color:green'>🎉 ถูกต้อง! เก่งมาก</span>";
            document.getElementById('sound-correct').play();
            score += 10;
            document.getElementById('score').innerText = score;
            clearInterval(timerInt);
        } else {
            document.getElementById('result').innerHTML = "<span style='color:red'>❌ ยังไม่ถูก ลองอีกครั้งนะ</span>";
        }
    }

    window.onload = () => startGame(1);
</script>

</body>
</html>
