<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://flaticon.com">

    <title>เกมบวกเลขสายตึงของ นายเพรช v1.8.1</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --error: #e74c3c; --carry: #fffde7; --level-color: #9b59b6; --gold: #f1c40f; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        .app-card { background: white; padding: 20px 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 480px; position: relative; }
        
        .install-guide { background: #2c3e50; color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 13px; display: block; border: none; width: 100%; cursor: pointer; }
        .main-title { font-size: 22px; font-weight: bold; color: #2c3e50; margin: 5px 0 0 0; }
        .sub-title { font-size: 14px; color: var(--primary); font-weight: bold; margin-bottom: 10px; display: block; }
        .version-tag { position: absolute; top: 12px; right: 18px; font-size: 10px; color: #ccc; }
        .level-badge { display: inline-block; background: var(--level-color); color: white; padding: 4px 18px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        
        .difficulty-zones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .btn-mode { padding: 12px 2px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-mode.active { background: var(--primary); color: white; }
        
        .row-controls { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 15px; border: 2px dashed #ddd; }
        .btn-row-edit { width: 35px; height: 35px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; cursor: pointer; color: white; }
        .btn-plus { background: var(--success); }
        .btn-minus { background: var(--error); }

        .stats { display:flex; justify-content:space-around; font-weight:bold; background:#f8f9fa; padding:10px; border-radius:15px; margin-bottom:10px; border: 1px solid #eee; }
        
        /* สไตล์คะแนนปกติและติดลบ */
        #score-display { transition: color 0.3s ease; }
        .score-red { color: var(--error) !important; text-shadow: 0 0 2px rgba(231, 76, 60, 0.2); }
        .score-normal { color: #333; }

        .math-table { display: grid; grid-template-columns: 60px 1fr; gap: 4px; align-items: center; margin-bottom: 15px; max-height: 40vh; overflow-y: auto; padding-right: 5px; }
        .row-label { font-weight: bold; color: #bbb; font-size: 11px; text-align: left; }
        .digit-group { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; justify-items: end; }
        
        input { width: 100%; max-width: 44px; height: 52px; text-align: center; font-size: 24px; font-weight: bold; border: 2px solid #eee; border-radius: 10px; outline: none; box-sizing: border-box; }
        .carry-row input { height: 38px; background-color: var(--carry); border: 2px solid var(--gold); color: #d4ac0d; }
        
        .answer-row { border-top: 3px solid #444; padding-top: 10px; margin-top: 5px; grid-column: 1 / span 2; display: grid; grid-template-columns: 60px 1fr; gap: 4px; align-items: center; }
        .answer-row input { background-color: #f1fbf3; border-color: var(--success); }

        .btn-check { width: 100%; padding: 18px; background: var(--success); color: white; border: none; border-radius: 18px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 0 #27ae60; }
        .thai-read { font-size: 16px; color: #555; background: #fff9c4; padding: 8px; border-radius: 12px; margin-top: 5px; }
        .history-log { margin-top: 20px; border-top: 1px dashed #ddd; padding-top: 15px; text-align: left; }
        .history-item { padding: 8px 12px; border-radius: 10px; margin-bottom: 6px; border-left: 5px solid #ccc; background: #fdfdfd; display: flex; justify-content: space-between; font-size: 11px; }
    </style>
</head>
<body>

<div class="app-card">
    <button class="install-guide" onclick="showInstallInfo()">📲 วิธีติดตั้งแอปไว้บนมือถือ</button>
    <div class="version-tag">v1.8.1</div>
    <h1 class="main-title">เกมบวกเลขสายตึง</h1>
    <span class="sub-title">ของ นายเพรช</span>
    
    <div class="level-badge" id="level-tag">🏆 Level 0</div>
    
    <div class="difficulty-zones">
        <button class="btn-mode" id="m1" onclick="selectMode(1)">1 หลัก</button>
        <button class="btn-mode" id="m2" onclick="selectMode(2)">2 หลัก</button>
        <button class="btn-mode" id="m3" onclick="selectMode(3)">3 หลัก</button>
        <button class="btn-mode" id="m4" onclick="selectMode(4)">4 หลัก</button>
        <button class="btn-mode" id="m5" onclick="selectMode(5)">5 หลัก</button>
        <button class="btn-mode" id="m0" onclick="selectMode(0)" style="color:#f39c12">🔀 สุ่ม</button>
    </div>

    <div class="row-controls">
        <button class="btn-row-edit btn-minus" onclick="changeRows(-1)">−</button>
        <div style="font-weight:bold; min-width: 140px;">บวกกัน <span id="row-num">2</span> จำนวน</div>
        <button class="btn-row-edit btn-plus" onclick="changeRows(1)">+</button>
    </div>

    <div class="stats">
        <span>⏱️ <span id="time-val">0</span> วิ</span>
        <span>⭐ <span id="score-display" class="score-normal">0</span></span>
    </div>

    <div class="math-table" id="math-grid">
        <div class="row-label">ตัวทด</div>
        <div class="digit-group carry-row">
            <input type="number" id="c5" class="num-in"><input type="number" id="c4" class="num-in"><input type="number" id="c3" class="num-in"><input type="number" id="c2" class="num-in"><input type="number" id="c1" class="num-in">
            <div style="width: 100%; max-width: 44px; height: 38px; visibility: hidden;"></div> 
        </div>
        <div id="quest-rows-container" style="display: contents;"></div>
        <div class="answer-row">
            <div class="row-label">คำตอบ</div>
            <div class="digit-group">
                <input type="number" id="a5" class="num-in"><input type="number" id="a4" class="num-in"><input type="number" id="a3" class="num-in"><input type="number" id="a2" class="num-in"><input type="number" id="a1" class="num-in"><input type="number" id="a0" class="num-in">
            </div>
        </div>
    </div>

    <div id="result-text" style="min-height:40px; font-weight:bold; margin:5px;"></div>
    <button class="btn-check" id="main-btn" onclick="checkAnswer()">🎯 ตรวจคำตอบ</button>

    <div class="history-log">
        <strong>🕒 ประวัติ 10 ข้อล่าสุด:</strong>
        <div id="log-list"></div>
    </div>
</div>

<script>
    function showInstallInfo() {
        const ua = navigator.userAgent.toLowerCase();
        if (ua.indexOf('iphone') > -1 || ua.indexOf('ipad') > -1) alert("วิธีติดตั้งบน iPhone:\n1. กดปุ่ม 'แชร์'\n2. เลือก 'เพิ่มลงในหน้าจอโฮม'");
        else alert("วิธีติดตั้งบน Android:\n1. กดปุ่ม '3 จุด'\n2. เลือก 'ติดตั้งแอป'");
    }

    let nValues = [], ans, selectedMode = 1, curD = 1, totalScore = 0, sec = 0, timer, rowCount = 2, hList = [];

    function thaiRead(num) {
        if (num === 0) return "ศูนย์";
        const units = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];
        const digits = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
        let str = num.toString(), result = "";
        for (let i = 0; i < str.length; i++) {
            let d = parseInt(str[i]), pos = str.length - i - 1;
            if (d !== 0) {
                if (pos === 1 && d === 1) result += "";
                else if (pos === 1 && d === 2) result += "ยี่";
                else if (pos === 0 && d === 1 && str.length > 1) result += "เอ็ด";
                else result += digits[d];
                result += units[pos];
            }
        }
        return result;
    }

    function changeRows(val) {
        rowCount = Math.max(2, Math.min(10, rowCount + val));
        document.getElementById('row-num').innerText = rowCount;
        startGame(selectedMode === 0 ? Math.floor(Math.random() * 5) + 1 : selectedMode);
    }

    function selectMode(d) { selectedMode = d; startGame(d === 0 ? Math.floor(Math.random() * 5) + 1 : d); }

    function startGame(d) {
        curD = d; clearInterval(timer); sec = 0;
        document.getElementById('time-val').innerText = "0";
        document.getElementById('result-text').innerHTML = "";
        const btn = document.getElementById('main-btn');
        btn.innerText = "🎯 ตรวจคำตอบ"; btn.onclick = checkAnswer;
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
        document.getElementById('m' + selectedMode).classList.add('active');

        const container = document.getElementById('quest-rows-container');
        container.innerHTML = ""; nValues = []; ans = 0;
        let min = Math.pow(10, d-1), max = Math.pow(10, d)-1;

        for(let r=1; r<=rowCount; r++) {
            let val = Math.floor(Math.random()*(max-min+1)+min);
            nValues.push(val); ans += val;
            container.innerHTML += `<div class="row-label">#${r}</div><div class="digit-group">
                <input type="text" id="q${r}_5" readonly style="opacity:0"><input type="text" id="q${r}_4" readonly><input type="text" id="q${r}_3" readonly><input type="text" id="q${r}_2" readonly><input type="text" id="q${r}_1" readonly><input type="text" id="q${r}_0" readonly>
            </div>`;
        }

        nValues.forEach((num, idx) => {
            let arr = num.toString().split('').reverse();
            for(let i=0; i<=5; i++) {
                let el = document.getElementById(`q${idx+1}_${i}`);
                if(el) el.value = arr[i] || (el.style.opacity === "0" ? "" : "");
            }
        });

        document.querySelectorAll('.num-in').forEach(el => el.value = "");
        const ins = Array.from(document.querySelectorAll('.num-in'));
        ins.forEach((input, i) => {
            input.oninput = (e) => {
                if (e.target.value.length > 1) e.target.value = e.target.value.slice(-1);
                if (e.target.value && i < ins.length - 1) ins[i+1].focus();
            };
            input.onkeydown = (e) => { if (e.key === 'Backspace' && !e.target.value && i > 0) ins[i-1].focus(); };
        });
        timer = setInterval(() => { sec++; document.getElementById('time-val').innerText = sec; }, 1000);
    }

    function checkAnswer() {
        let uStr = "";
        for(let i=5; i>=0; i--) { let v = document.getElementById('a' + i).value; if(v!=="") uStr += v; }
        if(uStr === "") return;
        let uNum = parseInt(uStr), isRight = (uNum === ans);
        let point = (curD * 2) * (rowCount - 1);
        clearInterval(timer);

        totalScore += isRight ? point : -point;
        
        // อัปเดตการแสดงผลคะแนนและสี
        const scoreEl = document.getElementById('score-display');
        scoreEl.innerText = totalScore;
        if(totalScore < 0) {
            scoreEl.className = "score-red";
        } else {
            scoreEl.className = "score-normal";
        }

        document.getElementById('result-text').innerHTML = (isRight ? `<span style='color:green'>ถูกต้อง! +${point}</span>` : `<span style='color:red'>ผิดครับ -${point}</span>`) + `<div class="thai-read">คำอ่าน: ${thaiRead(ans)}</div>`;
        document.getElementById('level-tag').innerText = `🏆 Level ${Math.max(0, Math.floor(totalScore/100))}`;
        
        addHistory(isRight, uNum);
        document.getElementById('main-btn').innerText = "🎲 ข้อต่อไป";
        document.getElementById('main-btn').onclick = () => selectMode(selectedMode);
    }

    function addHistory(isRight, uN) {
        const list = document.getElementById('log-list');
        let taskText = nValues.join(' + ') + ` = ${ans}`;
        hList.unshift({ t: taskText, u: uN, ok: isRight });
        if(hList.length > 10) hList.pop();
        list.innerHTML = "";
        hList.forEach(i => {
            const d = document.createElement('div');
            d.className = `history-item ${i.ok ? 'item-correct' : 'item-wrong'}`;
            d.innerHTML = `<span>${i.t.substring(0,25)}...</span><span>ตอบ: ${i.u} ${i.ok ? '✅':'❌'}</span>`;
            list.appendChild(d);
        });
    }

    window.onload = () => startGame(1);
</script>
</body>
</html>
