<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมฝึกบวกเลข - ช่องตรงกันทุกแถว</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --primary: #3498db;
            --success: #2ecc71;
            --carry-color: #f1c40f;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 650px;
        }

        .difficulty-zones {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-mode {
            padding: 10px 20px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-mode:hover { background: var(--primary); color: white; }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #555;
        }

        .math-grid {
            display: inline-block;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 5px;
        }

        .label {
            font-weight: bold;
            color: #888;
            width: 80px;
            text-align: left;
        }

        /* ขนาด Input เท่ากันทุกช่อง */
        input {
            width: 55px;
            height: 65px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin: 2px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        /* สีพิเศษสำหรับช่องตัวทด */
        .carry-row input {
            background-color: #fffde7;
            border-color: var(--carry-color);
            color: #d4ac0d;
        }

        /* เส้นใต้แสดงการบวก */
        .answer-row {
            border-top: 4px solid #333;
            margin-top: 10px;
            padding-top: 10px;
        }

        .answer-row input {
            background-color: #e8f5e9;
            border-color: var(--success);
        }

        .btn-check {
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .result-box {
            height: 40px;
            margin: 15px 0;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h6>✍️ แบบฝึกหัดการบวกเลข เด็กชายเพรช</h6>

    <div class="difficulty-zones">
        <button class="btn-mode" onclick="startGame(1)">1 หลัก</button>
        <button class="btn-mode" onclick="startGame(2)">2 หลัก</button>
        <button class="btn-mode" onclick="startGame(3)">3 หลัก</button>
        <button class="btn-mode" onclick="startGame(4)">4 หลัก</button>
    </div>

    <div class="stats">
        <span>⏱️ เวลา: <span id="time">0</span> วิ</span>
        <span>⭐ คะแนน: <span id="score">0</span></span>
    </div>

    <div class="math-grid">
        <!-- แถวตัวทด: ปรับเป็น 6 ช่องให้เท่ากับช่องคำตอบสูงสุด -->
        <div class="row carry-row">
            <span class="label">ตัวทด</span>
            <input type="number" id="c5" maxlength="1">
            <input type="number" id="c4" maxlength="1">
            <input type="number" id="c3" maxlength="1">
            <input type="number" id="c2" maxlength="1">
            <input type="number" id="c1" maxlength="1">
            <input type="number" id="c0" maxlength="1">
        </div>

        <!-- แถวตัวตั้ง -->
        <div class="row">
            <span class="label">ตัวตั้ง</span>
            <input type="text" id="q1_5" readonly style="opacity:0"> <!-- ช่องเสริมให้แถวเท่ากัน -->
            <input type="text" id="q1_4" readonly>
            <input type="text" id="q1_3" readonly>
            <input type="text" id="q1_2" readonly>
            <input type="text" id="q1_1" readonly>
            <input type="text" id="q1_0" readonly>
        </div>

        <!-- แถวตัวบวก -->
        <div class="row">
            <span class="label">ตัวบวก</span>
            <input type="text" id="q2_5" readonly style="opacity:0"> <!-- ช่องเสริมให้แถวเท่ากัน -->
            <input type="text" id="q2_4" readonly>
            <input type="text" id="q2_3" readonly>
            <input type="text" id="q2_2" readonly>
            <input type="text" id="q2_1" readonly>
            <input type="text" id="q2_0" readonly>
        </div>

        <!-- แถวคำตอบ -->
        <div class="row answer-row">
            <span class="label">คำตอบ</span>
            <input type="number" id="a5" maxlength="1">
            <input type="number" id="a4" maxlength="1">
            <input type="number" id="a3" maxlength="1">
            <input type="number" id="a2" maxlength="1">
            <input type="number" id="a1" maxlength="1">
            <input type="number" id="a0" maxlength="1">
        </div>
    </div>

    <div id="result" class="result-box"></div>
    <button class="btn-check" onclick="checkAnswer()">🎯 ตรวจคำตอบ</button>
</div>

<audio id="sound-correct" src="https://soundjay.com"></audio>

<script>
    let currentAns = 0;
    let score = 0;
    let timer = 0;
    let timerInt;

    // ระบบ Input จัดการเรื่องกรอกเลขตัวเดียวและ Focus
    document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('input', function() {
            if (this.value.length > 1) this.value = this.value.slice(-1);
            if (this.value) {
                const allInputs = Array.from(document.querySelectorAll('input[type="number"]'));
                const index = allInputs.indexOf(this);
                if (index < allInputs.length - 1) allInputs[index + 1].focus();
            }
        });
    });

    function startGame(digit) {
        clearInterval(timerInt);
        timer = 0;
        document.getElementById('time').innerText = timer;
        document.getElementById('result').innerText = "";
        
        // ล้างข้อมูลทุกช่อง
        document.querySelectorAll('input').forEach(el => {
            if(!el.readOnly || el.style.opacity !== "0") el.value = "";
        });

        // สุ่มโจทย์
        let min = Math.pow(10, digit - 1);
        let max = Math.pow(10, digit) - 1;
        let n1 = Math.floor(Math.random() * (max - min + 1) + min);
        let n2 = Math.floor(Math.random() * (max - min + 1) + min);
        currentAns = n1 + n2;

        fill('q1_', n1);
        fill('q2_', n2);

        timerInt = setInterval(() => {
            timer++;
            document.getElementById('time').innerText = timer;
        }, 1000);
    }

    function fill(prefix, num) {
        for(let i=0; i<=5; i++) {
            let el = document.getElementById(prefix + i);
            if(el && el.style.opacity !== "0") el.value = "";
        }
        let s = num.toString().split('').reverse();
        s.forEach((v, i) => {
            let el = document.getElementById(prefix + i);
            if(el) el.value = v;
        });
    }

    function checkAnswer() {
        let ansStr = "";
        for(let i=5; i>=0; i--) {
            ansStr += document.getElementById('a' + i).value;
        }
        
        if (parseInt(ansStr) === currentAns) {
            document.getElementById('result').innerHTML = "<span style='color:green'>🎉 ถูกต้อง!</span>";
            document.getElementById('sound-correct').play();
            score += 10;
            document.getElementById('score').innerText = score;
            clearInterval(timerInt);
        } else {
            document.getElementById('result').innerHTML = "<span style='color:red'>❌ ลองใหม่อีกครั้ง</span>";
        }
    }

    window.onload = () => startGame(1);
</script>
</body>
</html>
