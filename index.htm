<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมฝึกบวกเลขพร้อมตัวทด</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary-color: #4a90e2;
            --success-color: #4caf50;
            --error-color: #f44336;
            --input-border: #ced4da;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 400px;
        }

        .header {
            margin-bottom: 20px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: #555;
            background: #e9ecef;
            padding: 10px;
            border-radius: 10px;
        }

        /* ตารางคำนวณ */
        .math-grid {
            display: inline-block;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 8px;
        }

        .row-label {
            margin-right: 15px;
            font-weight: bold;
            color: #666;
            width: 80px;
            text-align: left;
        }

        input {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin: 0 2px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.5);
        }

        /* แถวตัวทด */
        .carry-row input {
            height: 35px;
            width: 35px;
            font-size: 18px;
            border-color: #ffcc80;
            background-color: #fffde7;
            color: #f57c00;
        }

        /* แถวคำตอบ */
        .answer-row {
            border-top: 3px solid #333;
            margin-top: 10px;
            padding-top: 10px;
        }

        .answer-row input {
            border-color: #81c784;
            background-color: #f1f8e9;
        }

        /* ปุ่มต่างๆ */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-random { background-color: var(--primary-color); color: white; }
        .btn-check { background-color: var(--success-color); color: white; }

        .result-msg {
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
            height: 30px;
        }

        .correct { color: var(--success-color); }
        .wrong { color: var(--error-color); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h2>🧮 ฝึกบวกเลข (Step-by-Step)</h2>
    </div>

    <div class="stats-bar">
        <span>⏱️ เวลา: <span id="timer">0</span> วิ</span>
        <span>🏆 คะแนน: <span id="score">0</span></span>
    </div>

    <div class="math-grid">
        <!-- แถวตัวทด -->
        <div class="row carry-row">
            <span class="row-label">ตัวทด</span>
            <input type="number" id="c4" maxlength="1">
            <input type="number" id="c3" maxlength="1">
            <input type="number" id="c2" maxlength="1">
            <input type="number" id="c1" maxlength="1">
            <div style="width: 49px;"></div> <!-- เว้นหลักสุดท้าย -->
        </div>

        <!-- ตัวเลขโจทย์ 1 -->
        <div class="row">
            <span class="row-label">ตัวตั้ง</span>
            <input type="text" id="q1_4" readonly tabindex="-1">
            <input type="text" id="q1_3" readonly tabindex="-1">
            <input type="text" id="q1_2" readonly tabindex="-1">
            <input type="text" id="q1_1" readonly tabindex="-1">
            <input type="text" id="q1_0" readonly tabindex="-1">
        </div>

        <!-- ตัวเลขโจทย์ 2 -->
        <div class="row">
            <span class="row-label">ตัวบวก</span>
            <input type="text" id="q2_4" readonly tabindex="-1">
            <input type="text" id="q2_3" readonly tabindex="-1">
            <input type="text" id="q2_2" readonly tabindex="-1">
            <input type="text" id="q2_1" readonly tabindex="-1">
            <input type="text" id="q2_0" readonly tabindex="-1">
        </div>

        <!-- แถวคำตอบ -->
        <div class="row answer-row">
            <span class="row-label">คำตอบ</span>
            <input type="number" id="a5" maxlength="1">
            <input type="number" id="a4" maxlength="1">
            <input type="number" id="a3" maxlength="1">
            <input type="number" id="a2" maxlength="1">
            <input type="number" id="a1" maxlength="1">
            <input type="number" id="a0" maxlength="1">
        </div>
    </div>

    <div class="result-msg" id="msg"></div>

    <div class="controls">
        <button class="btn btn-check" onclick="checkAnswer()">🎯 ตรวจคำตอบ</button>
        <button class="btn btn-random" onclick="initGame()">🎲 สุ่มโจทย์ใหม่ (Clear)</button>
    </div>
</div>

<!-- เสียงประกอบ -->
<audio id="snd-correct" src="https://soundjay.com"></audio>
<audio id="snd-wrong" src="https://soundjay.com"></audio>

<script>
    let score = 0;
    let seconds = 0;
    let timerInterval;
    let correctAnswer = 0;

    // ระบบจัดการ Input: ใส่ได้ตัวเดียวและกระโดดไปช่องถัดไป
    document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('input', function() {
            if (this.value.length > 1) this.value = this.value.slice(-1);
            if (this.value !== "") {
                const next = this.nextElementSibling;
                if (next && next.tagName === "INPUT") next.focus();
            }
        });
    });

    function startTimer() {
        clearInterval(timerInterval);
        seconds = 0;
        document.getElementById('timer').innerText = seconds;
        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById('timer').innerText = seconds;
        }, 1000);
    }

    function initGame() {
        startTimer();
        // 1. ล้างค่าทุกช่อง
        document.querySelectorAll('input').forEach(el => {
            if(!el.readOnly) el.value = "";
            el.style.backgroundColor = ""; 
        });
        document.getElementById('msg').innerHTML = "";

        // 2. สุ่มตัวเลข (สุ่ม 2-4 หลัก)
        const digits = Math.floor(Math.random() * 3) + 2;
        const max = Math.pow(10, digits) - 1;
        const min = Math.pow(10, digits - 1);
        
        const n1 = Math.floor(Math.random() * (max - min + 1) + min);
        const n2 = Math.floor(Math.random() * (max - min + 1) + min);
        correctAnswer = n1 + n2;

        // 3. แสดงเลขโจทย์
        fillQuestion('q1_', n1);
        fillQuestion('q2_', n2);
    }

    function fillQuestion(prefix, num) {
        // เคลียร์ช่องโจทย์ก่อน
        for(let i=0; i<=4; i++) document.getElementById(prefix + i).value = "";
        
        let digits = num.toString().split('').reverse();
        digits.forEach((digit, i) => {
            document.getElementById(prefix + i).value = digit;
        });
    }

    function checkAnswer() {
        let userStr = "";
        // รวมเลขจากช่องคำตอบ a5 ถึง a0
        for(let i=5; i>=0; i--) {
            userStr += document.getElementById('a' + i).value;
        }
        
        const userVal = parseInt(userStr);

        if (userVal === correctAnswer) {
            document.getElementById('msg').innerHTML = "<span class='correct'>🎯 ถูกต้องยอดเยี่ยม!</span>";
            document.getElementById('snd-correct').play();
            score += 10;
            document.getElementById('score').innerText = score;
            clearInterval(timerInterval);
        } else {
            document.getElementById('msg').innerHTML = "<span class='wrong'>❌ ลองใหม่อีกนิดนะ</span>";
            document.getElementById('snd-wrong').play();
        }
    }

    // เริ่มเกมครั้งแรก
    window.onload = initGame;
</script>

</body>
</html>
