<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คณิตศาสตร์อัจฉริยะ v1.5.0</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --error: #e74c3c; --carry: #fffde7; --level-color: #9b59b6; --random-all: #f39c12; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 550px; position: relative; }
        .version-tag { position: absolute; top: 10px; right: 15px; font-size: 10px; color: #bbb; }
        .level-badge { display: inline-block; background: var(--level-color); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; box-shadow: 0 3px 0 #8e44ad; font-size: 14px; }
        
        /* เมนูปุ่มเลือกหลัก */
        .difficulty-zones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .btn-mode { padding: 10px 2px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-mode.active { background: var(--primary); color: white; }
        .btn-random-mode { border-color: var(--random-all); color: var(--random-all); }
        .btn-random-mode.active { background: var(--random-all); color: white; border-color: var(--random-all); }

        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; font-size: 1.1rem; font-weight: bold; background: #eef2f7; padding: 10px; border-radius: 15px; border: 1px solid #d1d9e6; }
        #score-display { color: #f39c12; font-size: 1.3rem; }

        .math-grid { display: inline-block; margin-bottom: 15px; width: 100%; }
        .row { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 3px; }
        .label { font-weight: bold; color: #aaa; width: 45px; text-align: left; font-size: 11px; }

        /* ปรับขนาดช่องให้เล็กลงเล็กน้อยเพื่อรองรับ 5-6 หลัก */
        input { width: 12.5%; max-width: 42px; height: 50px; text-align: center; font-size: 22px; font-weight: bold; margin: 1px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        .carry-row input { height: 32px; background-color: var(--carry); border-color: #f1c40f; color: #d4ac0d; font-size: 14px; }
        .answer-row { border-top: 3px solid #333; margin-top: 5px; padding-top: 5px; }
        .answer-row input { background-color: #e8f5e9; border-color: var(--success); }

        .btn-check { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #27ae60; }
        .btn-next { background: var(--primary); box-shadow: 0 4px 0 #2980b9; }
        .result-box { height: 35px; margin: 5px 0; font-size: 18px; font-weight: bold; }

        #level-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .popup-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 80%; }
        .history-log { margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px; text-align: left; }
        .history-item { padding: 6px; border-radius: 8px; margin-bottom: 5px; border-left: 5px solid #ccc; background: #fafafa; display: flex; justify-content: space-between; font-size: 11px; }
        .item-correct { border-left-color: var(--success); }
        .item-wrong { border-left-color: var(--error); }
    </style>
</head>
<body>

<div id="level-popup"><div class="popup-content"><h2>🎉 LEVEL UP!</h2><p id="pop-desc"></p><button style="padding: 10px 30px; background: var(--success); color: white; border: none; border-radius: 10px;" onclick="closePopup()">ลุยต่อ!</button></div></div>

<div class="app-card">
    <div class="version-tag">v1.5.0-MixMode</div>
    <div class="level-badge" id="level-tag">🏆 Level 0</div>
    
    <div class="difficulty-zones">
        <button class="btn-mode" id="m1" onclick="selectMode(1)">1 หลัก</button>
        <button class="btn-mode" id="m2" onclick="selectMode(2)">2 หลัก</button>
        <button class="btn-mode" id="m3" onclick="selectMode(3)">3 หลัก</button>
        <button class="btn-mode" id="m4" onclick="selectMode(4)">4 หลัก</button>
        <button class="btn-mode" id="m5" onclick="selectMode(5)">5 หลัก</button>
        <button class="btn-mode btn-random-mode" id="m0" onclick="selectMode(0)">🔀 สุ่มทุกหลัก</button>
    </div>

    <div class="stats">
        <span>⏱️ <span id="time-val">0</span> วิ</span>
        <span>⭐ <span id="score-display">0</span></span>
    </div>

    <div class="math-grid">
        <div class="row carry-row">
            <span class="label">ตัวทด</span>
            <input type="number" id="c6" class="num-in"><input type="number" id="c5" class="num-in"><input type="number" id="c4" class="num-in"><input type="number" id="c3" class="num-in"><input type="number" id="c2" class="num-in"><input type="number" id="c1" class="num-in"><div style="width:12.5%; max-width:42px; margin:1px;"></div>
        </div>
        <!-- โจทย์ (รองรับ 5 หลัก + 1 หลักเผื่อทดในคำตอบ) -->
        <div class="row"><span class="label">ตัวตั้ง</span><input type="text" id="q1_5" readonly style="opacity:0"><input type="text" id="q1_4" readonly><input type="text" id="q1_3" readonly><input type="text" id="q1_2" readonly><input type="text" id="q1_1" readonly><input type="text" id="q1_0" readonly></div>
        <div class="row"><span class="label">ตัวบวก</span><input type="text" id="q2_5" readonly style="opacity:0"><input type="text" id="q2_4" readonly><input type="text" id="q2_3" readonly><input type="text" id="q2_2" readonly><input type="text" id="q2_1" readonly><input type="text" id="q2_0" readonly></div>
        <div class="row answer-row">
            <span class="label">คำตอบ</span>
            <input type="number" id="a5" class="num-in"><input type="number" id="a4" class="num-in"><input type="number" id="a3" class="num-in"><input type="number" id="a2" class="num-in"><input type="number" id="a1" class="num-in"><input type="number" id="a0" class="num-in">
        </div>
    </div>

    <div id="result-text" class="result-box"></div>
    <button class="btn-check" id="main-btn" onclick="checkAnswer()">🎯 ตรวจคำตอบ</button>
    <div class="history-log"><strong>🕒 ประวัติ:</strong><div id="log-list"></div></div>
</div>

<script>
    let n1, n2, ans, selectedMode = 1, curD = 1, totalScore = 0, sec = 0, timer, hList = [];
    let lastLevelAwarded = 0;

    const ins = Array.from(document.querySelectorAll('.num-in'));
    ins.forEach((input, i) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length > 1) e.target.value = e.target.value.slice(-1);
            if (e.target.value && i < ins.length - 1) ins[i+1].focus();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && i > 0) ins[i-1].focus();
        });
    });

    function selectMode(d) {
        selectedMode = d;
        startGame(d === 0 ? Math.floor(Math.random() * 5) + 1 : d);
    }

    function startGame(d) {
        curD = d; clearInterval(timer); sec = 0;
        document.getElementById('time-val').innerText = "0";
        document.getElementById('result-text').innerText = "";
        const btn = document.getElementById('main-btn');
        btn.innerText = "🎯 ตรวจคำตอบ"; btn.className = "btn-check"; btn.onclick = checkAnswer;
        
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
        document.getElementById('m' + selectedMode).classList.add('active');
        
        document.querySelectorAll('input').forEach(el => { if(!el.readOnly || el.style.opacity !== "0") el.value = ""; });
        let min = Math.pow(10, d-1), max = Math.pow(10, d)-1;
        n1 = Math.floor(Math.random()*(max-min+1)+min);
        n2 = Math.floor(Math.random()*(max-min+1)+min);
        ans = n1 + n2;
        renderRows('q1_', n1); renderRows('q2_', n2);
        timer = setInterval(() => { sec++; document.getElementById('time-val').innerText = sec; }, 1000);
    }

    function renderRows(p, num) {
        let digits = num.toString().split('').reverse();
        for(let i=0; i<=5; i++) {
            let el = document.getElementById(p+i);
            if(el) el.value = digits[i] || (el.style.opacity === "0" ? "" : "");
        }
    }

    function checkAnswer() {
        let uStr = "";
        for(let i=5; i>=0; i--) { let v = document.getElementById('a'+i).value; if(v!=="") uStr += v; }
        if(uStr === "") return;
        let uNum = parseInt(uStr);
        let isRight = (uNum === ans);
        let point = curD * 2; // คำนวณคะแนนตามหลัก (1หลัก=2, 2หลัก=4...)
        clearInterval(timer);

        if(isRight) {
            totalScore += point;
            document.getElementById('result-text').innerHTML = `<span style='color:green'>ถูกต้อง! +${point} คะแนน</span>`;
            checkLevelUp();
        } else {
            totalScore -= point;
            document.getElementById('result-text').innerHTML = `<span style='color:red'>ผิดครับ -${point} คะแนน</span>`;
        }

        updateUI();
        addHistory(isRight, uNum);
        document.getElementById('main-btn').innerText = "🎲 ข้อต่อไป";
        document.getElementById('main-btn').onclick = () => selectMode(selectedMode);
    }

    function updateUI() {
        const scoreDisplay = document.getElementById('score-display');
        scoreDisplay.innerText = totalScore;
        scoreDisplay.style.color = totalScore < 0 ? 'red' : '#f39c12';
        document.getElementById('level-tag').innerText = `🏆 Level ${Math.max(0, Math.floor(totalScore / 100))}`;
    }

    function checkLevelUp() {
        if (totalScore > 0 && Math.floor(totalScore / 100) > Math.floor(lastLevelAwarded / 100)) {
            lastLevelAwarded = totalScore;
            document.getElementById('pop-desc').innerText = `ยินดีด้วย! คะแนนรวม ${totalScore}\nคุณผ่านเข้าสู่ Level ${Math.floor(totalScore / 100)} แล้ว!`;
            document.getElementById('level-popup').style.display = 'flex';
        }
    }

    function closePopup() { document.getElementById('level-popup').style.display = 'none'; }

    function addHistory(isRight, uNum) {
        const list = document.getElementById('log-list');
        hList.unshift({ t: `${n1}+${n2}=${ans}`, u: uNum, ok: isRight });
        if(hList.length > 10) hList.pop();
        list.innerHTML = "";
        hList.forEach(item => {
            const div = document.createElement('div');
            div.className = `history-item ${item.ok ? 'item-correct' : 'item-wrong'}`;
            div.innerHTML = `<span>${item.t}</span><span>ตอบ: ${item.u} ${item.ok ? '✅':'❌'}</span>`;
            list.appendChild(div);
        });
    }
    window.onload = () => startGame(1);
</script>
</body>
</html>
