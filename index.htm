<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://flaticon.com">

    <title>เกมคณิตสายตึงของ ธนพงษ์ เผ่าเพ็ง v2.1.0</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://jsdelivr.net"></script>
    
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --error: #e74c3c; --carry: #fffde7; --level-color: #9b59b6; --gold: #f1c40f; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-card { background: white; padding: 20px 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 480px; position: relative; }
        
        .main-title { font-size: 22px; font-weight: bold; color: #2c3e50; margin: 5px 0 0 0; }
        .sub-title { font-size: 14px; color: var(--primary); font-weight: bold; margin-bottom: 10px; display: block; }
        
        /* Level Badge */
        .level-badge { display: inline-block; background: var(--level-color); color: white; padding: 4px 18px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; font-size: 14px; box-shadow: 0 3px 0 #8e44ad; }

        .op-switch { display: flex; gap: 5px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 15px; }
        .btn-op { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-op.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--primary); }

        .difficulty-zones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .btn-mode { padding: 10px 2px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-mode.active { background: var(--primary); color: white; }
        
        .stats { display:flex; justify-content:space-around; font-weight:bold; background:#f8f9fa; padding:10px; border-radius:15px; margin-bottom:10px; border: 1px solid #eee; }
        #score-display { transition: color 0.3s; }
        .score-red { color: var(--error) !important; }

        .math-table { display: grid; grid-template-columns: 60px 1fr; gap: 4px; align-items: center; margin-bottom: 15px; max-height: 40vh; overflow-y: auto; padding: 10px; border: 1px solid #eee; border-radius: 15px; }
        .digit-group { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; justify-items: end; }
        
        input { width: 100%; max-width: 44px; height: 50px; text-align: center; font-size: 22px; font-weight: bold; border: 2px solid #eee; border-radius: 10px; outline: none; box-sizing: border-box; }
        .carry-row input { height: 35px; background-color: var(--carry); border: 2px solid var(--gold); color: #d4ac0d; font-size: 14px; }
        
        .answer-row { border-top: 3px solid #444; padding-top: 10px; margin-top: 5px; grid-column: 1 / span 2; display: grid; grid-template-columns: 60px 1fr; gap: 4px; align-items: center; }
        .answer-row input { background-color: #f1fbf3; border-color: var(--success); }

        .btn-check { width: 100%; padding: 18px; background: var(--success); color: white; border: none; border-radius: 18px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 0 #27ae60; }
        
        /* Popup Level Up */
        #level-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .popup-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 80%; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        .history-log { margin-top: 20px; border-top: 1px dashed #ddd; padding-top: 15px; text-align: left; }
        .history-item { padding: 8px 12px; border-radius: 10px; margin-bottom: 6px; border-left: 8px solid #ccc; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }
        .item-correct { border-color: var(--success); background: #e8f5e9; color: #2e7d32; }
        .item-wrong { border-color: var(--error); background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

<div id="level-popup">
    <div class="popup-content">
        <h2 style="color:var(--level-color); margin:0;">🎉 LEVEL UP!</h2>
        <p id="pop-desc" style="font-size:18px; margin:15px 0; color:#555;"></p>
        <button style="padding:10px 30px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="document.getElementById('level-popup').style.display='none'">ลุยต่อ!</button>
    </div>
</div>

<div class="app-card">
    <h1 class="main-title">เกมคณิตศาสตร์สายตึง</h1>
    <span class="sub-title">ของ ธนพงษ์ เผ่าเพ็ง</span>
    
    <div class="level-badge" id="level-tag">🏆 Level 0</div>

    <div class="op-switch">
        <button id="op-add" class="btn-op active" onclick="setOp('add')">➕ การบวก</button>
        <button id="op-mul" class="btn-op" onclick="setOp('mul')">✖️ การคูณ</button>
    </div>

    <div id="mode-selectors" class="difficulty-zones"></div>

    <div id="row-ctrl" class="stats" style="background:#fff; border: 2px dashed #ddd;">
        <button style="border:none; background:var(--error); color:white; width:30px; border-radius:5px; cursor:pointer;" onclick="changeRows(-1)">-</button>
        <span style="font-size:14px;">บวกกัน <span id="row-num">2</span> จำนวน</span>
        <button style="border:none; background:var(--success); color:white; width:30px; border-radius:5px; cursor:pointer;" onclick="changeRows(1)">+</button>
    </div>

    <div class="stats">
        <span>⏱️ <span id="time-val">0</span> วิ</span>
        <span>⭐ คะแนนรวม: <span id="score-display">0</span></span>
    </div>

    <div class="math-table" id="math-grid">
        <div style="font-weight:bold; color:#bbb; font-size:11px;">ตัวทด</div>
        <div class="digit-group carry-row">
            <input type="number" id="c5" class="num-in"><input type="number" id="c4" class="num-in"><input type="number" id="c3" class="num-in"><input type="number" id="c2" class="num-in"><input type="number" id="c1" class="num-in">
            <div style="width: 100%; max-width: 44px; height: 35px; visibility: hidden;"></div> 
        </div>
        <div id="quest-rows-container" style="display: contents;"></div>
        <div class="answer-row">
            <div style="font-weight:bold; color:#bbb; font-size:11px;">คำตอบ</div>
            <div class="digit-group">
                <input type="number" id="a5" class="num-in"><input type="number" id="a4" class="num-in"><input type="number" id="a3" class="num-in"><input type="number" id="a2" class="num-in"><input type="number" id="a1" class="num-in"><input type="number" id="a0" class="num-in">
            </div>
        </div>
    </div>

    <div id="result-text" style="min-height:40px; font-weight:bold; margin:5px;"></div>
    <button class="btn-check" id="main-btn" onclick="checkAnswer()">🎯 ตรวจคำตอบ</button>
    <div class="history-log"><strong>🕒 ประวัติ 10 ข้อล่าสุด:</strong><div id="log-list"></div></div>
</div>

<script>
    let currentOp = 'add', nValues = [], ans, totalScore = 0, sec = 0, timer, rowCount = 2, hList = [];
    let curD1 = 1, curD2 = 1, lastLevelAwarded = 0;

    function setOp(op) {
        currentOp = op;
        document.getElementById('op-add').classList.toggle('active', op === 'add');
        document.getElementById('op-mul').classList.toggle('active', op === 'mul');
        document.getElementById('row-ctrl').style.display = (op === 'add') ? 'flex' : 'none';
        renderModes(); startGame();
    }

    function renderModes() {
        const container = document.getElementById('mode-selectors');
        container.innerHTML = "";
        if (currentOp === 'add') {
            for(let i=1; i<=5; i++) container.innerHTML += `<button class="btn-mode" id="m${i}" onclick="startWithD(${i})">${i} หลัก</button>`;
            container.innerHTML += `<button class="btn-mode" id="m0" onclick="startWithD(0)" style="color:#f39c12">🔀 สุ่ม</button>`;
        } else {
            const mSet = [[2,1],[3,1],[4,1],[2,2],[3,2]];
            mSet.forEach((s, idx) => {
                container.innerHTML += `<button class="btn-mode" id="mul${idx}" onclick="startMul(${s[0]}, ${s[1]}, ${idx})">${s[0]}x${s[1]}</button>`;
            });
        }
    }

    function startWithD(d) { curD1 = d; startGame(); }
    function startMul(d1, d2, idx) { 
        curD1 = d1; curD2 = d2; 
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
        if(document.getElementById('mul'+idx)) document.getElementById('mul'+idx).classList.add('active');
        startGame(); 
    }

    function changeRows(v) { rowCount = Math.max(2, Math.min(10, rowCount + v)); document.getElementById('row-num').innerText = rowCount; startGame(); }

    function startGame() {
        clearInterval(timer); sec = 0; document.getElementById('time-val').innerText = "0";
        document.getElementById('result-text').innerHTML = "";
        const btn = document.getElementById('main-btn'); btn.innerText = "🎯 ตรวจคำตอบ"; btn.onclick = checkAnswer;
        if(currentOp === 'add') {
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            if(document.getElementById('m'+curD1)) document.getElementById('m'+curD1).classList.add('active');
        }
        const container = document.getElementById('quest-rows-container');
        container.innerHTML = ""; nValues = []; ans = (currentOp === 'add') ? 0 : 1;

        if (currentOp === 'add') {
            let d = curD1 === 0 ? Math.floor(Math.random()*5)+1 : curD1;
            for(let r=1; r<=rowCount; r++) {
                let v = Math.floor(Math.random()*(Math.pow(10, d)-Math.pow(10, d-1)))+Math.pow(10, d-1);
                nValues.push(v); ans += v;
                container.innerHTML += `<div style="font-weight:bold; color:#bbb; font-size:11px;">#${r}</div><div class="digit-group" id="row-${r}"></div>`;
                renderRowDigits(`row-${r}`, v);
            }
        } else {
            let v1 = Math.floor(Math.random()*(Math.pow(10, curD1)-Math.pow(10, curD1-1)))+Math.pow(10, curD1-1);
            let v2 = Math.floor(Math.random()*(Math.pow(10, curD2)-Math.pow(10, curD2-1)))+Math.pow(10, curD2-1);
            nValues = [v1, v2]; ans = v1 * v2;
            container.innerHTML += `<div style="font-weight:bold; color:#bbb; font-size:11px;">ตั้ง</div><div class="digit-group" id="row-1"></div>`;
            container.innerHTML += `<div style="font-weight:bold; color:#bbb; font-size:11px;">คูณ</div><div class="digit-group" id="row-2"></div>`;
            renderRowDigits(`row-1`, v1); renderRowDigits(`row-2`, v2);
        }
        document.querySelectorAll('.num-in').forEach(el => el.value = "");
        setupInputLogic();
        timer = setInterval(() => { sec++; document.getElementById('time-val').innerText = sec; }, 1000);
    }

    function renderRowDigits(id, num) {
        const row = document.getElementById(id);
        let arr = num.toString().split('').reverse();
        for(let i=5; i>=0; i--) {
            let val = arr[i] || "";
            let opac = (arr[i] !== undefined) ? 1 : 0;
            row.innerHTML += `<input type="text" value="${val}" readonly style="opacity:${opac}">`;
        }
    }

    function setupInputLogic() {
        const ins = Array.from(document.querySelectorAll('.num-in'));
        ins.forEach((input, i) => {
            input.oninput = (e) => {
                if (e.target.value.length > 1) e.target.value = e.target.value.slice(-1);
                if (e.target.value && i < ins.length - 1) ins[i+1].focus();
            };
            input.onkeydown = (e) => { if (e.key === 'Backspace' && !e.target.value && i > 0) ins[i-1].focus(); };
        });
    }

    function checkAnswer() {
        let uStr = "";
        for(let i=5; i>=0; i--) { let v = document.getElementById('a'+i).value; if(v!=="") uStr += v; }
        if(uStr === "") return;
        let uNum = parseInt(uStr), isRight = (uNum === ans);
        let point = (currentOp === 'add') ? (curD1||3)*rowCount : (curD1+curD2)*2;
        clearInterval(timer);

        totalScore += isRight ? point : -point;
        document.getElementById('score-display').innerText = totalScore;
        document.getElementById('score-display').className = totalScore < 0 ? "score-red" : "";
        document.getElementById('level-tag').innerText = `🏆 Level ${Math.max(0, Math.floor(totalScore/100))}`;

        if(isRight) {
            document.getElementById('result-text').innerHTML = `<span style='color:green'>ถูกต้อง! +${point}</span>`;
            checkLevelUp();
        } else {
            document.getElementById('result-text').innerHTML = `<span style='color:red'>ผิดครับ -${point}</span>`;
        }

        addHistory(isRight, uNum);
        document.getElementById('main-btn').innerText = "🎲 ข้อต่อไป";
        document.getElementById('main-btn').onclick = () => startGame();
    }

    function checkLevelUp() {
        if (totalScore > 0 && Math.floor(totalScore / 100) > Math.floor(lastLevelAwarded / 100)) {
            lastLevelAwarded = totalScore;
            document.getElementById('pop-desc').innerText = `ยินดีด้วยคุณธนพงษ์! คะแนนรวม ${totalScore}\nคุณผ่านเข้าสู่ Level ${Math.floor(totalScore / 100)} แล้ว!`;
            document.getElementById('level-popup').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function addHistory(isR, uN) {
        const list = document.getElementById('log-list');
        let txt = nValues.join(currentOp === 'add' ? '+' : 'x') + ` = ${ans}`;
        hList.unshift({ t: txt, u: uN, ok: isR });
        if(hList.length > 10) hList.pop();
        list.innerHTML = "";
        hList.forEach(i => {
            const d = document.createElement('div');
            d.className = `history-item ${i.ok ? 'item-correct' : 'item-wrong'}`;
            d.innerHTML = `<span>${i.t.substring(0,25)}</span><span>ตอบ: ${i.u} ${i.ok ? '✅':'❌'}</span>`;
            list.appendChild(d);
        });
    }

    window.onload = () => setOp('add');
</script>
</body>
</html>
