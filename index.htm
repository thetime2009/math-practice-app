<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คณิตศาสตร์เรียลไทม์</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --error: #e74c3c; --carry: #fffde7; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .app-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 650px; }
        .difficulty-zones { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn-mode { padding: 10px 15px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-mode.active { background: var(--primary); color: white; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; font-size: 1.4rem; font-weight: bold; color: #2c3e50; background: #eef2f7; padding: 15px; border-radius: 15px; border: 2px solid #d1d9e6; }
        #score-display { color: #f39c12; font-size: 1.8rem; }
        .math-grid { display: inline-block; margin-bottom: 20px; }
        .row { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 5px; }
        .label { font-weight: bold; color: #888; width: 80px; text-align: left; }
        input { width: 55px; height: 65px; text-align: center; font-size: 32px; font-weight: bold; margin: 2px; border: 2px solid #ddd; border-radius: 10px; outline: none; }
        .carry-row input { background-color: var(--carry); border-color: #f1c40f; color: #d4ac0d; }
        .answer-row { border-top: 4px solid #333; margin-top: 10px; padding-top: 10px; }
        .answer-row input { background-color: #e8f5e9; border-color: var(--success); }
        .btn-check { width: 100%; padding: 18px; background: var(--success); color: white; border: none; border-radius: 15px; font-size: 24px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 0 #27ae60; }
        .btn-check:disabled { background: #ccc; box-shadow: none; opacity: 0.7; }
        .result-box { height: 45px; margin: 10px 0; font-size: 26px; font-weight: bold; }
        .history-log { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; text-align: left; }
        .history-item { padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; border-left: 6px solid #ccc; background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
        .item-correct { border-left-color: var(--success); background: #f1fbf3; }
        .item-wrong { border-left-color: var(--error); background: #fdf2f2; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>✍️ ฝึกบวกเลข (ระบบคะแนน Real-time)</h2>
    <div class="difficulty-zones">
        <button class="btn-mode" id="m1" onclick="startGame(1)">1 หลัก</button>
        <button class="btn-mode" id="m2" onclick="startGame(2)">2 หลัก</button>
        <button class="btn-mode" id="m3" onclick="startGame(3)">3 หลัก</button>
        <button class="btn-mode" id="m4" onclick="startGame(4)">4 หลัก</button>
    </div>
    <div class="stats">
        <span>⏱️ <span id="timer-val">0</span> วิ</span>
        <span>⭐ คะแนน: <span id="score-display">0</span></span>
    </div>
    <div class="math-grid">
        <div class="row carry-row">
            <span class="label">ตัวทด</span>
            <input type="number" id="c5" class="num-in"><input type="number" id="c4" class="num-in"><input type="number" id="c3" class="num-in"><input type="number" id="c2" class="num-in"><input type="number" id="c1" class="num-in"><input type="number" id="c0" class="num-in">
        </div>
        <div class="row"><span class="label">ตัวตั้ง</span><input type="text" id="q1_5" readonly style="opacity:0"><input type="text" id="q1_4" readonly><input type="text" id="q1_3" readonly><input type="text" id="q1_2" readonly><input type="text" id="q1_1" readonly><input type="text" id="q1_0" readonly></div>
        <div class="row"><span class="label">ตัวบวก</span><input type="text" id="q2_5" readonly style="opacity:0"><input type="text" id="q2_4" readonly><input type="text" id="q2_3" readonly><input type="text" id="q2_2" readonly><input type="text" id="q2_1" readonly><input type="text" id="q2_0" readonly></div>
        <div class="row answer-row">
            <span class="label">คำตอบ</span>
            <input type="number" id="a5" class="num-in"><input type="number" id="a4" class="num-in"><input type="number" id="a3" class="num-in"><input type="number" id="a2" class="num-in"><input type="number" id="a1" class="num-in"><input type="number" id="a0" class="num-in">
        </div>
    </div>
    <div id="result-text" class="result-box"></div>
    <button class="btn-check" id="check-btn" onclick="checkAnswer()">🎯 ตรวจคำตอบ</button>
    <div class="history-log"><strong>🕒 ประวัติ 10 ข้อล่าสุด:</strong><div id="log-list"></div></div>
</div>

<script>
    // ตัวแปร Global ป้องกันคะแนนรีเซ็ต
    let totalScore = 0; 
    let n1 = 0, n2 = 0, correctAns = 0, currentDigit = 1;
    let seconds = 0, timerObj, historyData = [];

    const inputs = Array.from(document.querySelectorAll('.num-in'));
    inputs.forEach((input, i) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length > 1) e.target.value = e.target.value.slice(-1);
            if (e.target.value && i < inputs.length - 1) inputs[i+1].focus();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && i > 0) inputs[i-1].focus();
        });
    });

    function startGame(digit) {
        currentDigit = digit;
        clearInterval(timerObj);
        seconds = 0;
        document.getElementById('timer-val').innerText = "0";
        document.getElementById('result-text').innerText = "";
        document.getElementById('check-btn').disabled = false;
        
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
        document.getElementById('m'+digit).classList.add('active');

        document.querySelectorAll('input').forEach(el => {
            if(!el.readOnly || el.style.opacity !== "0") el.value = "";
        });

        let min = Math.pow(10, digit - 1), max = Math.pow(10, digit) - 1;
        n1 = Math.floor(Math.random() * (max - min + 1) + min);
        n2 = Math.floor(Math.random() * (max - min + 1) + min);
        correctAns = n1 + n2;

        renderRows('q1_', n1); renderRows('q2_', n2);
        timerObj = setInterval(() => { seconds++; document.getElementById('timer-val').innerText = seconds; }, 1000);
    }

    function renderRows(prefix, num) {
        let digits = num.toString().split('').reverse();
        for(let i=0; i<=5; i++) {
            let el = document.getElementById(prefix + i);
            if(el) el.value = digits[i] || (el.style.opacity === "0" ? "" : "");
        }
    }

    function checkAnswer() {
        let userStr = "";
        for(let i=5; i>=0; i--) {
            let val = document.getElementById('a' + i).value;
            if(val !== "") userStr += val;
        }
        if(userStr === "") return alert("กรุณาใส่คำตอบก่อนครับ");
        
        let userNum = parseInt(userStr);
        let isCorrect = (userNum === correctAns);
        const checkBtn = document.getElementById('check-btn');
        checkBtn.disabled = true;

        if (isCorrect) {
            totalScore += 10; // บวกคะแนนสะสมจริง
            document.getElementById('result-text').innerHTML = "<span style='color:green'>ถูกต้อง! +10 (กำลังสุ่มใหม่...)</span>";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            clearInterval(timerObj);
        } else {
            totalScore -= 10; // หักคะแนนสะสมจริง
            if(totalScore < 0) totalScore = 0;
            document.getElementById('result-text').innerHTML = "<span style='color:red'>ผิดครับ -10 (กำลังสุ่มใหม่...)</span>";
        }

        // อัปเดตการแสดงผลคะแนน "ทันที"
        document.getElementById('score-display').innerText = totalScore;
        
        saveHistory(isCorrect, userNum);

        // รอ 3 วิแล้วเริ่มข้อใหม่
        setTimeout(() => {
            startGame(currentDigit);
        }, 3000);
    }

    function saveHistory(isCorrect, userNum) {
        const logList = document.getElementById('log-list');
        historyData.unshift({ task: `${n1} + ${n2} = ${correctAns}`, user: userNum, status: isCorrect });
        if (historyData.length > 10) historyData.pop();

        logList.innerHTML = "";
        historyData.forEach(item => {
            const div = document.createElement('div');
            div.className = `history-item ${item.status ? 'item-correct' : 'item-wrong'}`;
            div.innerHTML = `<span>${item.task}</span><span>ตอบ: ${item.user} ${item.status ? '✅' : '❌'}</span>`;
            logList.appendChild(div);
        });
    }

    window.onload = () => startGame(1);
</script>
</body>
</html>
