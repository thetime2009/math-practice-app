<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฝึกบวกเลขทีละขั้น</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --primary: #4a90e2;
            --success: #4caf50;
            --carry-bg: #fffde7;
            --carry-border: #ffd54f;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-card {
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #f1f3f5;
            padding: 10px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* ปุ่มเลือกหลัก */
        .difficulty-zones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn-mode {
            padding: 10px 5px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-mode:hover {
            background: var(--primary);
            color: white;
        }

        /* ตารางเลข */
        .math-table {
            display: inline-block;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 5px;
        }

        .label {
            font-size: 14px;
            color: #888;
            margin-right: 10px;
            width: 60px;
            text-align: left;
        }

        input {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin: 2px;
            border: 2px solid #ddd;
            border-radius: 10px;
        }

        /* ช่องตัวทด */
        .carry-row input {
            height: 38px;
            width: 38px;
            font-size: 18px;
            background: var(--carry-bg);
            border-color: var(--carry-border);
            color: #f57c00;
        }

        /* ช่องคำตอบ */
        .answer-row {
            border-top: 3px solid #333;
            margin-top: 10px;
            padding-top: 10px;
        }

        .answer-row input {
            border-color: var(--success);
            background: #f1f8e9;
        }

        .btn-check {
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .result-box {
            height: 40px;
            margin: 15px 0;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h3>🎯 ฝึกบวกเลขทีละหลัก</h3>
    
    <div class="difficulty-zones">
        <button class="btn-mode" onclick="startGame(1)">1 หลัก</button>
        <button class="btn-mode" onclick="startGame(2)">2 หลัก</button>
        <button class="btn-mode" onclick="startGame(3)">3 หลัก</button>
        <button class="btn-mode" onclick="startGame(4)">4 หลัก</button>
    </div>

    <div class="stats">
        <span>⏱️ <span id="time">0</span> วิ</span>
        <span>⭐ <span id="score">0</span></span>
    </div>

    <div class="math-table">
        <!-- ตัวทด -->
        <div class="row carry-row">
            <span class="label">ตัวทด</span>
            <input type="number" id="c4">
            <input type="number" id="c3">
            <input type="number" id="c2">
            <input type="number" id="c1">
            <div style="width: 49px;"></div>
        </div>
        <!-- โจทย์ -->
        <div class="row">
            <span class="label">ตัวตั้ง</span>
            <input type="text" id="q1_4" readonly>
            <input type="text" id="q1_3" readonly>
            <input type="text" id="q1_2" readonly>
            <input type="text" id="q1_1" readonly>
            <input type="text" id="q1_0" readonly>
        </div>
        <div class="row">
            <span class="label">ตัวบวก</span>
            <input type="text" id="q2_4" readonly>
            <input type="text" id="q2_3" readonly>
            <input type="text" id="q2_2" readonly>
            <input type="text" id="q2_1" readonly>
            <input type="text" id="q2_0" readonly>
        </div>
        <!-- คำตอบ -->
        <div class="row answer-row">
            <span class="label">คำตอบ</span>
            <input type="number" id="a5">
            <input type="number" id="a4">
            <input type="number" id="a3">
            <input type="number" id="a2">
            <input type="number" id="a1">
            <input type="number" id="a0">
        </div>
    </div>

    <div id="result" class="result-box"></div>
    <button class="btn-check" onclick="checkAnswer()">ตรวจคำตอบ</button>
</div>

<audio id="sound-win" src="https://soundjay.com"></audio>

<script>
    let currentAns = 0;
    let score = 0;
    let timer = 0;
    let timerInt;

    // ระบบ Input ตัวเดียวแล้วข้ามช่อง
    document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('input', function() {
            if (this.value.length > 1) this.value = this.value.slice(-1);
            if (this.value) {
                let next = this.nextElementSibling;
                if(next && next.tagName === "INPUT") next.focus();
            }
        });
    });

    function startGame(digit) {
        // 1. Reset ทุกอย่าง (Clear)
        clearInterval(timerInt);
        timer = 0;
        document.getElementById('time').innerText = timer;
        document.getElementById('result').innerText = "";
        document.querySelectorAll('input').forEach(el => {
            if(!el.readOnly) el.value = "";
            el.style.backgroundColor = "";
        });

        // 2. สุ่มเลขตามหลักที่เลือก
        let min = Math.pow(10, digit - 1);
        let max = Math.pow(10, digit) - 1;
        let n1 = Math.floor(Math.random() * (max - min + 1) + min);
        let n2 = Math.floor(Math.random() * (max - min + 1) + min);
        currentAns = n1 + n2;

        // 3. แสดงเลขโจทย์ (กระจายตัวเลข)
        distributeNumber('q1_', n1);
        distributeNumber('q2_', n2);

        // 4. เริ่มจับเวลา
        timerInt = setInterval(() => {
            timer++;
            document.getElementById('time').innerText = timer;
        }, 1000);
    }

    function distributeNumber(prefix, num) {
        for(let i=0; i<=4; i++) document.getElementById(prefix + i).value = "";
        let arr = num.toString().split('').reverse();
        arr.forEach((d, i) => document.getElementById(prefix + i).value = d);
    }

    function checkAnswer() {
        let userStr = "";
        for(let i=5; i>=0; i--) userStr += document.getElementById('a' + i).value;
        
        if (parseInt(userStr) === currentAns) {
            document.getElementById('result').innerHTML = "✅ เก่งมาก!";
            document.getElementById('result').style.color = "green";
            document.getElementById('sound-win').play();
            score += 10;
            document.getElementById('score').innerText = score;
            clearInterval(timerInt);
        } else {
            document.getElementById('result').innerHTML = "❌ ลองคำนวณใหม่นะ";
            document.getElementById('result').style.color = "red";
        }
    }

    // เริ่มเกมครั้งแรก (Default 1 หลัก)
    window.onload = () => startGame(1);
</script>

</body>
</html>
